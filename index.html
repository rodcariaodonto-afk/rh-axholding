    <script>
      // Prevent theme flash by reading cached theme before React hydrates
      (function() {
        try {
          var resolved;
          // Try org-specific theme cache first
          var keys = Object.keys(localStorage).filter(function(k) { return k.startsWith('orb-theme-cache-'); });
          if (keys.length > 0) {
            var cached = JSON.parse(localStorage.getItem(keys[0]));
            if (cached && cached.colorMode) {
              resolved = cached.colorMode === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : cached.colorMode;
            }
          }
          // Fallback to next-themes localStorage key
          if (!resolved) {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark') resolved = 'dark';
            else if (theme === 'light') resolved = 'light';
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) resolved = 'dark';
          }
          if (resolved) {
            document.documentElement.classList.add(resolved);
            document.documentElement.style.colorScheme = resolved;
          }
        } catch (e) {}
      })();
    </script>
